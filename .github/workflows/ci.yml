name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff
        run: ruff check src/ tests/

  test:
    needs: lint
    runs-on: ubuntu-latest
    env:
      JWT_SECRET_KEY: ci-test-jwt-secret-key-for-github-actions
      INTERNAL_API_KEY: ci-test-internal-api-key
      VECTOR_STORE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ai_vectors_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pytest (90% coverage gate)
        run: make test
